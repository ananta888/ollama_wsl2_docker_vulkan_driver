services:
  ollama:
    build:
      context: .
      dockerfile: Dockerfile.ollama-wsl-amd
    image: ollama-wsl-amd:latest
    container_name: ollama-wsl-amd
    ports:
      - "11434:11434"
    devices:
      - "/dev/dxg:/dev/dxg"
    environment:
      LD_LIBRARY_PATH: /usr/lib/wsl/lib:/usr/local/nvidia/lib:/usr/local/nvidia/lib64
      OLLAMA_VULKAN: "1"
      VK_ICD_FILENAMES: /usr/share/vulkan/icd.d/dzn_icd.json
    volumes:
      - /usr/lib/wsl:/usr/lib/wsl:ro
      - ollama-model-cache:/root/.ollama
    restart: unless-stopped

volumes:
  ollama-model-cache:
